<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Woodline – Site en maintenance</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --wood:    #A0714F;
      --wood-lt: #C8A882;
      --cream:   #F5ECD7;
      --dark:    #1a1410;
      --charcoal:#2c2318;
    }

    html, body {
      height: 100%;
      background: var(--dark);
      color: var(--cream);
      font-family: 'Cormorant Garamond', serif;
      overflow: hidden;
    }

    /* ── Grain overlay ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.04;
      pointer-events: none;
      z-index: 10;
    }

    /* ── Wood grain lines (decorative) ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        92deg,
        transparent,
        transparent 40px,
        rgba(160,113,79,0.03) 40px,
        rgba(160,113,79,0.03) 41px
      );
      pointer-events: none;
      z-index: 1;
    }

    /* ── Layout ── */
    .stage {
      position: relative;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      z-index: 2;
    }

    /* ── Decorative ring ── */
    .ring {
      position: absolute;
      width: min(70vw, 600px);
      height: min(70vw, 600px);
      border-radius: 50%;
      border: 1px solid rgba(160,113,79,0.12);
      animation: pulse 6s ease-in-out infinite;
    }
    .ring:nth-child(2) {
      width: min(55vw, 480px);
      height: min(55vw, 480px);
      border-color: rgba(160,113,79,0.08);
      animation-delay: -2s;
    }
    .ring:nth-child(3) {
      width: min(40vw, 360px);
      height: min(40vw, 360px);
      border-color: rgba(160,113,79,0.06);
      animation-delay: -4s;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1);   opacity: 1; }
      50%       { transform: scale(1.04); opacity: 0.6; }
    }

    /* ── Content ── */
    .content {
      position: relative;
      z-index: 3;
      animation: fadeUp 1.2s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Logo ── */
    .logo {
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: 4px;
      margin-bottom: 3rem;
      animation: fadeUp 1.2s cubic-bezier(0.16,1,0.3,1) 0.1s both;
    }
    .logo-w {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(3rem, 8vw, 5rem);
      font-weight: 600;
      color: var(--wood);
      line-height: 1;
      letter-spacing: -2px;
    }
    .logo-rest {
      font-family: 'Cinzel', serif;
      font-size: clamp(0.9rem, 2vw, 1.2rem);
      font-weight: 400;
      letter-spacing: 10px;
      color: var(--wood-lt);
      text-transform: uppercase;
    }

    /* ── Divider ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      justify-content: center;
      margin: 0 auto 2.5rem;
      width: min(300px, 80vw);
      animation: fadeUp 1.2s cubic-bezier(0.16,1,0.3,1) 0.2s both;
    }
    .divider-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--wood), transparent);
    }
    .divider-diamond {
      width: 6px;
      height: 6px;
      background: var(--wood);
      transform: rotate(45deg);
      flex-shrink: 0;
    }

    /* ── Main text ── */
    .eyebrow {
      font-family: 'Cinzel', serif;
      font-size: clamp(0.6rem, 1.5vw, 0.75rem);
      letter-spacing: 5px;
      text-transform: uppercase;
      color: var(--wood);
      margin-bottom: 1.25rem;
      animation: fadeUp 1.2s cubic-bezier(0.16,1,0.3,1) 0.3s both;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 6vw, 4rem);
      font-weight: 300;
      line-height: 1.15;
      color: var(--cream);
      margin-bottom: 1.5rem;
      animation: fadeUp 1.2s cubic-bezier(0.16,1,0.3,1) 0.4s both;
    }
    h1 em {
      font-style: italic;
      color: var(--wood-lt);
    }

    .subtitle {
      font-size: clamp(0.95rem, 2vw, 1.15rem);
      font-weight: 300;
      color: rgba(245,236,215,0.5);
      line-height: 1.8;
      max-width: 420px;
      margin: 0 auto 3rem;
      animation: fadeUp 1.2s cubic-bezier(0.16,1,0.3,1) 0.5s both;
    }

    /* ── Contact link ── */
    .contact {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      font-family: 'Cinzel', serif;
      font-size: 0.7rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--wood-lt);
      text-decoration: none;
      border-bottom: 1px solid rgba(160,113,79,0.3);
      padding-bottom: 4px;
      transition: color 0.3s, border-color 0.3s;
      animation: fadeUp 1.2s cubic-bezier(0.16,1,0.3,1) 0.6s both;
    }
    .contact:hover {
      color: var(--cream);
      border-color: var(--cream);
    }

    /* ── Bottom tag ── */
    .tag {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.65rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(245,236,215,0.18);
      white-space: nowrap;
      animation: fadeUp 1.2s cubic-bezier(0.16,1,0.3,1) 0.8s both;
    }

    /* ── Animated wood chip top-left ── */
    .deco {
      position: fixed;
      top: 2.5rem;
      left: 2.5rem;
      width: 40px;
      height: 2px;
      background: var(--wood);
      opacity: 0.4;
      animation: fadeUp 1.2s cubic-bezier(0.16,1,0.3,1) 1s both;
    }
    .deco::after {
      content: '';
      display: block;
      width: 20px;
      height: 2px;
      background: var(--wood);
      margin-top: 6px;
      opacity: 0.5;
    }

    @media (max-width: 480px) {
      .logo-rest { letter-spacing: 6px; }
    }
  </style>
</head>
<body>

  <div class="deco"></div>

  <div class="stage">
    <div class="ring"></div>
    <div class="ring"></div>
    <div class="ring"></div>

    <div class="content">

      <div class="logo" aria-label="Woodline">
        <span class="logo-w">W</span>
        <span class="logo-rest">OODLINE</span>
      </div>

      <div class="divider">
        <span class="divider-line"></span>
        <span class="divider-diamond"></span>
        <span class="divider-line"></span>
      </div>

      <p class="eyebrow">Site en maintenance</p>

      <h1>Nous revenons<br /><em>très bientôt.</em></h1>

      <p class="subtitle">
        Notre site est en cours de mise à jour.<br />
        Merci de votre patience.
      </p>

    </div>
  </div>

</body>
</html>
